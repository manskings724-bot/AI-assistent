<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jani — Your Personal Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e17;
    --bg2: #16141f;
    --bg3: #1e1b2e;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --text: #e8e6f0;
    --text2: #9d9ab5;
    --text3: #5c5a72;
    --border: rgba(124,106,247,0.15);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --radius: 20px;
    --font: 'DM Sans', sans-serif;
    --font-display: 'Playfair Display', serif;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  #app {
    width: 100%;
    max-width: 480px;
    height: 680px;
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow), 0 0 80px rgba(124,106,247,0.08);
    overflow: hidden;
    position: relative;
  }

  /* Subtle glow top */
  #app::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #avatar-wrap { position: relative; }
  #avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #534AB7, #1D9E75);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 20px; color: #fff;
    box-shadow: 0 0 0 3px rgba(124,106,247,0.2);
  }
  #status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    position: absolute; bottom: 1px; right: 1px;
    border: 2px solid var(--bg2);
    transition: background 0.3s;
  }

  #header-info { flex: 1; }
  #header-info h2 {
    font-family: var(--font-display);
    font-size: 17px; color: var(--text);
    letter-spacing: 0.3px;
  }
  #status-text {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
    transition: color 0.3s;
  }

  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }

  /* Volume control */
  #vol-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #vol-wrap label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  #vol-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--bg);
    outline: none;
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  #vol-val { font-size: 12px; color: var(--text2); width: 28px; text-align: right; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 88%; animation: fadeUp 0.3s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble {
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg.assistant .bubble {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #534AB7, #7c6af7);
    color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 4px 16px rgba(124,106,247,0.3);
  }

  .msg-av {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .msg.assistant .msg-av { background: linear-gradient(135deg,#534AB7,#1D9E75); color:#fff; }
  .msg.user .msg-av { background: #534AB7; color:#fff; }

  .time { font-size: 11px; color: var(--text3); text-align: center; }

  /* Typing indicator */
  .typing-wrap { display: flex; gap: 4px; align-items: center; padding: 12px 15px; }
  .typing-wrap span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    animation: bounce 1.2s infinite;
  }
  .typing-wrap span:nth-child(2) { animation-delay: .2s; }
  .typing-wrap span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Speaking wave */
  #speaking-bar {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 8px 20px;
    background: rgba(52,211,153,0.08);
    border-top: 1px solid rgba(52,211,153,0.15);
    border-bottom: 1px solid rgba(52,211,153,0.15);
    flex-shrink: 0;
  }
  #speaking-bar.active { display: flex; }
  #speaking-bar span {
    display: inline-block;
    width: 3px; border-radius: 3px;
    background: var(--green);
    animation: wave 1s ease-in-out infinite;
  }
  #speaking-bar span:nth-child(1) { height: 8px;  animation-delay: 0s; }
  #speaking-bar span:nth-child(2) { height: 14px; animation-delay: .1s; }
  #speaking-bar span:nth-child(3) { height: 20px; animation-delay: .2s; }
  #speaking-bar span:nth-child(4) { height: 14px; animation-delay: .3s; }
  #speaking-bar span:nth-child(5) { height: 8px;  animation-delay: .4s; }
  #speaking-bar span:nth-child(6) { height: 18px; animation-delay: .15s; }
  #speaking-bar span:nth-child(7) { height: 12px; animation-delay: .25s; }
  #speaking-label { font-size: 12px; color: var(--green); margin-left: 10px; }
  @keyframes wave {
    0%,100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* Footer */
  #footer {
    padding: 14px 16px 18px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Transcript */
  #transcript-bar {
    min-height: 18px;
    font-size: 12px;
    color: var(--accent2);
    text-align: center;
    font-style: italic;
    margin-bottom: 10px;
  }

  /* Mic + stop row */
  #mic-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  #mic-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    background: linear-gradient(135deg, #534AB7, #7c6af7);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(124,106,247,0.4);
  }
  #mic-btn i { color: #fff; font-size: 26px; }
  #mic-btn:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(124,106,247,0.6); }
  #mic-btn.listening { background: linear-gradient(135deg, #c0392b, #f87171); animation: pulse 1.2s infinite; }
  #mic-btn:disabled { opacity: 0.35; cursor: default; animation: none; transform: none; }

  #stop-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
  }
  #stop-btn:hover { background: rgba(248,113,113,0.22); }
  #stop-btn:disabled { opacity: 0.3; cursor: default; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
    50%      { box-shadow: 0 0 0 14px rgba(248,113,113,0); }
  }

  #mic-label { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 10px; }

  /* Input row */
  #input-row { display: flex; gap: 8px; }
  #text-input {
    flex: 1;
    padding: 10px 16px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--bg3);
    font-size: 13px;
    color: var(--text);
    outline: none;
    font-family: var(--font);
    transition: border-color 0.2s;
  }
  #text-input::placeholder { color: var(--text3); }
  #text-input:focus { border-color: var(--accent); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #534AB7, #7c6af7);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(124,106,247,0.4);
    transition: transform 0.15s;
  }
  #send-btn:hover { transform: scale(1.08); }
  #send-btn i { color: #fff; font-size: 16px; }
  #send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

  /* Voice selector */
  #voice-select {
    width: 100%;
    padding: 6px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 12px;
    font-family: var(--font);
    outline: none;
    margin-bottom: 10px;
    cursor: pointer;
  }
  #voice-select option { background: var(--bg3); }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="avatar-wrap">
      <div id="avatar">J</div>
      <div id="status-dot"></div>
    </div>
    <div id="header-info">
      <h2>Jani</h2>
      <p id="status-text">Your personal assistant — ready to help</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()" title="Clear chat"><i class="ti ti-trash"></i></button>
    </div>
  </div>

  <!-- Volume control -->
  <div id="vol-wrap">
    <label for="vol-slider"><i class="ti ti-volume"></i> Volume</label>
    <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1"/>
    <span id="vol-val">100%</span>
  </div>

  <div id="messages" role="log" aria-live="polite"></div>

  <!-- Speaking animation bar -->
  <div id="speaking-bar">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    <span id="speaking-label">Jani is speaking…</span>
  </div>

  <div id="footer">
    <div id="transcript-bar" aria-live="polite"></div>

    <!-- Voice selector -->
    <select id="voice-select" aria-label="Choose voice"></select>

    <div id="mic-row">
      <button id="mic-btn" onclick="toggleMic()" aria-label="Start listening">
        <i class="ti ti-microphone" id="mic-icon"></i>
      </button>
      <button id="stop-btn" onclick="stopSpeaking()" title="Stop speaking" aria-label="Stop speaking">
        <i class="ti ti-player-stop"></i>
      </button>
    </div>
    <div id="mic-label">Tap mic to speak • Replies play automatically 🔊</div>

    <div id="input-row">
      <input id="text-input" placeholder="Or type here and press Enter…" onkeydown="onKey(event)" aria-label="Type a message"/>
      <button id="send-btn" onclick="sendText()" aria-label="Send">
        <i class="ti ti-send"></i>
      </button>
    </div>
  </div>
</div>

<script>
const messagesEl   = document.getElementById('messages');
const micBtn       = document.getElementById('mic-btn');
const micIcon      = document.getElementById('mic-icon');
const micLabel     = document.getElementById('mic-label');
const transcriptBar= document.getElementById('transcript-bar');
const statusText   = document.getElementById('status-text');
const statusDot    = document.getElementById('status-dot');
const textInput    = document.getElementById('text-input');
const sendBtn      = document.getElementById('send-btn');
const speakingBar  = document.getElementById('speaking-bar');
const stopBtn      = document.getElementById('stop-btn');
const volSlider    = document.getElementById('vol-slider');
const volVal       = document.getElementById('vol-val');
const voiceSelect  = document.getElementById('voice-select');

let history      = [];
let recognition  = null;
let isListening  = false;
let isSpeaking   = false;
let currentVolume= 1.0;
let voices       = [];

// ─── Volume slider ───────────────────────────────────────
volSlider.addEventListener('input', () => {
  currentVolume = parseFloat(volSlider.value);
  volVal.textContent = Math.round(currentVolume * 100) + '%';
});

// ─── Voice loading ────────────────────────────────────────
function loadVoices() {
  voices = speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  const engVoices = voices.filter(v => v.lang.startsWith('en'));
  (engVoices.length ? engVoices : voices).forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    voiceSelect.appendChild(opt);
  });
  // Auto-select a nice female/natural voice if available
  const preferred = (engVoices.length ? engVoices : voices).findIndex(v =>
    v.name.toLowerCase().includes('female') ||
    v.name.toLowerCase().includes('samantha') ||
    v.name.toLowerCase().includes('karen') ||
    v.name.toLowerCase().includes('zira') ||
    v.name.toLowerCase().includes('natural')
  );
  if (preferred >= 0) voiceSelect.selectedIndex = preferred;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ─── Speech Recognition ───────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const micSupported = !!SpeechRecognition;

if (!micSupported) {
  micBtn.disabled = true;
  micLabel.textContent = 'Mic not supported — type below to chat 💬';
}

// ─── Helpers ─────────────────────────────────────────────
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}
function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function setStatus(text, color) {
  statusText.textContent = text;
  statusDot.style.background = color || '#34d399';
}

function addMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.setAttribute('aria-hidden', 'true');
  av.textContent = role === 'assistant' ? 'J' : 'U';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  const t = document.createElement('div');
  t.className = 'time';
  t.textContent = getTime();
  messagesEl.appendChild(t);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.setAttribute('aria-hidden', 'true');
  av.textContent = 'J';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-wrap"><span></span><span></span><span></span></div>';
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ─── Speak (AUTO — no button needed) ─────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.volume = currentVolume;
  utter.rate   = 1.0;
  utter.pitch  = 1.05;

  // Use selected voice
  const engVoices = voices.filter(v => v.lang.startsWith('en'));
  const pool = engVoices.length ? engVoices : voices;
  const idx  = parseInt(voiceSelect.value) || 0;
  if (pool[idx]) utter.voice = pool[idx];

  utter.onstart = () => {
    isSpeaking = true;
    speakingBar.classList.add('active');
    micBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus('Jani is speaking…', '#34d399');
  };
  utter.onend = utter.onerror = () => {
    isSpeaking = false;
    speakingBar.classList.remove('active');
    micBtn.disabled = false;
    stopBtn.disabled = true;
    setStatus('Ready to help', '#34d399');
  };

  // Small delay ensures voices are loaded on first run
  setTimeout(() => speechSynthesis.speak(utter), 100);
}

function stopSpeaking() {
  speechSynthesis.cancel();
}

// ─── API Call ─────────────────────────────────────────────
async function handleInput(text) {
  if (!text.trim()) return;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  micBtn.disabled  = true;
  sendBtn.disabled = true;
  setStatus('Jani is thinking…', '#7c6af7');
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Your name is Jani. You are a warm, friendly, and helpful personal voice assistant. Keep replies natural, conversational, and concise — 1 to 3 sentences unless more detail is truly needed. Avoid markdown, bullet points, or formatting since your responses will be spoken aloud.`,
        messages: history
      })
    });
    const data  = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || "Sorry, I had a little trouble there.";
    removeTyping();
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
    speak(reply); // ← AUTO speaks every reply
  } catch (e) {
    removeTyping();
    const err = "I'm sorry, I couldn't connect right now. Please try again!";
    addMessage('assistant', err);
    speak(err);
  }

  sendBtn.disabled = false;
}

// ─── Mic ─────────────────────────────────────────────────
function toggleMic() {
  if (!micSupported) return;
  if (isSpeaking) { stopSpeaking(); return; }
  if (isListening) { recognition.stop(); return; }
  startListening();
}

function startListening() {
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micIcon.className = 'ti ti-microphone';
    micLabel.textContent = 'Listening… tap mic to stop';
    setStatus('Listening…', '#f87171');
    transcriptBar.textContent = '';
  };
  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    transcriptBar.textContent = final || interim;
    if (final) { recognition.stop(); handleInput(final.trim()); }
  };
  recognition.onerror = (e) => {
    isListening = false;
    micBtn.classList.remove('listening');
    micLabel.textContent = 'Tap mic to speak • Replies play automatically 🔊';
    setStatus('Ready to help', '#34d399');
    if (e.error !== 'aborted') transcriptBar.textContent = 'Mic error: ' + e.error;
  };
  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    if (!isSpeaking) {
      micLabel.textContent = 'Tap mic to speak • Replies play automatically 🔊';
      setStatus('Ready to help', '#34d399');
    }
    setTimeout(() => { transcriptBar.textContent = ''; }, 2000);
  };
  recognition.start();
}

// ─── Text input ───────────────────────────────────────────
function sendText() {
  const t = textInput.value.trim();
  if (!t) return;
  textInput.value = '';
  handleInput(t);
}
function onKey(e) { if (e.key === 'Enter') sendText(); }

// ─── Clear ────────────────────────────────────────────────
function clearChat() {
  history = [];
  messagesEl.innerHTML = '';
  speechSynthesis && speechSynthesis.cancel();
  greet();
}

// ─── Greeting ─────────────────────────────────────────────
function greet() {
  const msg = `${getGreeting()}! I'm Jani, your personal assistant. Type or tap the mic — I'll reply and speak automatically!`;
  setTimeout(() => {
    addMessage('assistant', msg);
    history.push({ role: 'assistant', content: msg });
    speak(msg);
  }, 600);
}

stopBtn.disabled = true;
greet();
</script>
</body>
</html>
